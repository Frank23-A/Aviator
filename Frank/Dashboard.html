<!DOCTYPE html>
<html>
<head>
    <title>FortunePesa Clone</title>
    <style>
        body { margin: 0; background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;}
        #game-container { position: relative; width: 80%; max-width: 900px; height: 400px; margin-top: 50px; background: #0d1117; border-radius: 10px; overflow: hidden; border: 1px solid #1f2937; }
        canvas { width: 100%; height: 100%; }
        #multiplier { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 80px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .controls { display: flex; gap: 20px; margin-top: 20px; width: 80%; max-width: 900px; }
        .bet-card { flex: 1; background: #161b22; padding: 20px; border-radius: 8px; border-bottom: 4px solid #f02d44; }
        button { background: #f02d44; border: none; color: white; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .crashed { color: #f02d44; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="multiplier">1.00x</div>
        <canvas id="graphCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="bet-card">
            <input type="number" value="100" style="width: 90%; background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; margin-bottom: 10px;">
            <button id="betBtn">BET</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const multDisplay = document.getElementById('multiplier');
        const betBtn = document.getElementById('betBtn');
        
        let points = [];
        let socket = new WebSocket("ws://localhost:8000/ws");

        function drawGraph(mult) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#f02d44';
            ctx.lineWidth = 5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#f02d44";

            // Map multiplier to curve
            let x = (points.length / 500) * canvas.width;
            let y = canvas.height - (Math.log10(mult) * 200) - 50;
            points.push({x, y});

            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 50);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            // Draw "Comet" head
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(points[points.length-1].x, points[points.length-1].y, 5, 0, Math.PI*2);
            ctx.fill();
        }

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "update") {
                multDisplay.innerText = data.value + "x";
                multDisplay.classList.remove('crashed');
                drawGraph(data.value);
            } else if (data.type === "crash") {
                multDisplay.innerText = data.value + "x CRASHED!";
                multDisplay.classList.add('crashed');
                points = []; // Reset graph
            } else if (data.type === "status") {
                multDisplay.innerText = "PREPARING...";
                points = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        };

        // Resize canvas
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    </script>
</body>
</html>
