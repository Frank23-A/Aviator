<!DOCTYPE html>
<html>

<head>
<title>Aviator Simulation</title>

<style>

body{
margin:0;
background: radial-gradient(circle at left, #1c3b52, #000);
color:white;
font-family:Arial;
overflow:hidden;
}

#game{
position:relative;
width:100%;
height:400px;
overflow:hidden;
}

#plane{
position:absolute;
left:50px;
top:320px;
font-size:40px;
z-index:3;
}

#multiplier{
position:absolute;
right:60px;
top:60px;
font-size:60px;
font-weight:bold;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="game">

<canvas id="trail"></canvas>

<div id="plane">✈</div>

<div id="multiplier">1.00x</div>

</div>

<script>

let multiplier = 1
let crashPoint = 0
let interval

const plane = document.getElementById("plane")
const canvas = document.getElementById("trail")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = 400

let points = []

function startRound(){

fetch("/crash")
.then(res => res.json())
.then(data =>{

crashPoint = data.crash

multiplier = 1

plane.style.display="block"

plane.style.left="50px"
plane.style.top="320px"

points=[]

interval=setInterval(updateGame,40)

})

}

function updateGame(){

multiplier += 0.03

document.getElementById("multiplier").innerText =
multiplier.toFixed(2)+"x"

let x = 50 + multiplier*40
let y = 320 - multiplier*12

plane.style.left = x+"px"
plane.style.top = y+"px"

points.push({x:x+20,y:y+20})

drawTrail()

if(multiplier >= crashPoint){

clearInterval(interval)

plane.style.display="none"

setTimeout(startRound,2000)

}

}

function drawTrail(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()

ctx.moveTo(points[0]?.x || 0, points[0]?.y || 0)

for(let p of points){

ctx.lineTo(p.x,p.y)

}

ctx.strokeStyle="red"
ctx.lineWidth=4
ctx.stroke()

}

startRound()

</script>

</body>
</html>
